# Nginx внутри Docker: запросы приходят с хоста (proxy). Backend по имени backend:8000 — без проброса порта на хост.
upstream taskcash_backend {
    server backend:8000;
}

# Мини-апп (testuser)
server {
    listen 80 default_server;
    server_name testuser.telegbot3td.ru;
    root /var/www/frontend;
    index index.html;

    location /api/ {
        proxy_pass http://taskcash_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /index.html {
        add_header Cache-Control "no-store, no-cache";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# Админка (testadmin)
