name: Deploy to production
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_SSH_HOST }}
          port: 22
          username: ${{ secrets.PROD_SSH_USER }}
          password: ${{ secrets.PROD_SSH_PASS }}
          timeout: 60s
          command_timeout: 15m
          script: |
            set -e
            if [ ! -d /root/taskcash/.git ]; then
              mkdir -p /root/taskcash
              git clone https://github.com/daniil248/prodtaskcash.git /root/taskcash
            fi
            cd /root/taskcash
            git fetch origin main
            git reset --hard origin/main
            chmod +x scripts/deploy_from_git.sh
            bash scripts/deploy_from_git.sh
