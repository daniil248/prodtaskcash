# Админка: статика из root, /api/ на backend 127.0.0.1:8001
server {
    listen 80;
    server_name admin.taskcashbot.ru;
    return 301 https://$host$request_uri;
}
server {
    listen 443 ssl;
    server_name admin.taskcashbot.ru;
    ssl_certificate /etc/letsencrypt/live/admin.taskcashbot.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.taskcashbot.ru/privkey.pem;

    root /var/www/taskcash/admin;
    index index.html;

    location /api/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /index.html {
        add_header Cache-Control "no-store, no-cache";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
